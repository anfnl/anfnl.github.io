name: Régénérer publications et talks depuis own-bib.bib

# Se déclenche à chaque push qui modifie le .bib ou le script
on:
  push:
    paths:
      - "own-bib.bib"
      - "scripts/generate_pages.py"
  workflow_dispatch: {}   # permet aussi de le lancer à la main depuis l'onglet Actions

permissions:
  contents: write   # autorise le robot à committer les pages générées

jobs:
  build-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Générer les pages
        run: |
          python3 scripts/generate_pages.py own-bib.bib
          cp output/publications.html _pages/publications.html
          cp output/talks.html _pages/talks.html
          cp output/media.html _pages/media.html

      - name: Committer les pages si elles ont changé
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _pages/publications.html _pages/talks.html _pages/media.html
          git diff --cached --quiet || git commit -m "Régénération auto des pages publications/talks/media depuis own-bib.bib"
          git push
